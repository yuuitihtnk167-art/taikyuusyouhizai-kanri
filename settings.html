<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>設定 | 月額家電簿</title>
    <meta name="theme-color" content="#1f2933" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header settings-header">
        <div>
          <h1>設定</h1>
          <p class="subtitle">月額コストの計算方法を変更できます</p>
        </div>
        <button id="back-button" type="button" class="ghost-button">一覧に戻る</button>
      </header>

      <section class="panel settings-panel" aria-labelledby="monthly-cost-settings-title">
        <h2 id="monthly-cost-settings-title">月額コスト</h2>
        <label class="settings-toggle" for="include-underused-monthly-cost">
          <input id="include-underused-monthly-cost" type="checkbox" />
          <span>
            <strong>使用年数未達家電の月額コストを含める</strong>
            <small>予定より早く使用終了した家電を、実際の使用期間ベースで月額合計へ加算します。</small>
          </span>
        </label>
      </section>

      <section class="panel settings-panel" aria-labelledby="local-storage-settings-title">
        <h2 id="local-storage-settings-title">ローカル保存</h2>
        <div class="settings-action-card">
          <div>
            <strong>ローカル保存用ファイル作成</strong>
            <p>Firestoreに保存しているデータから、ローカル保存で復元できるファイルを作成します。</p>
          </div>
          <button id="firebase-local-backup-button" type="button" class="primary-button" disabled>
            ローカル保存用ファイル作成
          </button>
        </div>
        <p id="settings-status" class="form-error"></p>
      </section>

      <section class="panel settings-panel" aria-labelledby="asset-reference-settings-title">
        <h2 id="asset-reference-settings-title">耐用年数・単価の管理</h2>
        <div class="settings-action-card asset-reference-card">
          <form id="asset-reference-form" class="asset-reference-form">
            <input id="asset-reference-id" type="hidden" />
            <label for="asset-reference-name">商品名</label>
            <input id="asset-reference-name" type="text" autocomplete="off" required />
            <label for="asset-reference-useful-life-years">耐用年数</label>
            <input id="asset-reference-useful-life-years" type="number" inputmode="numeric" min="1" step="1" required />
            <label for="asset-reference-unit-price">単価</label>
            <input id="asset-reference-unit-price" type="number" inputmode="numeric" min="0" step="1" required />
            <div class="settings-action-row">
              <button id="asset-reference-save-button" type="submit" class="primary-button">追加する</button>
              <button id="asset-reference-cancel-button" type="button" class="ghost-button" hidden>キャンセル</button>
              <span id="asset-reference-summary" class="settings-muted-text">未登録</span>
            </div>
          </form>
          <div id="asset-reference-list" class="asset-reference-list"></div>
        </div>
        <p id="asset-reference-status" class="form-error"></p>
      </section>
    </main>
    <script type="module" src="js/settings.js"></script>
  </body>
</html>
