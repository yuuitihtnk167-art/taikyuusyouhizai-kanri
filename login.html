<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ログイン | 月額家電簿</title>
    <meta name="theme-color" content="#2563eb" />
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="icons/icon-192.png" type="image/png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="login-page">
    <main class="app login-app">
      <header class="app-header login-brand">
        <h1>月額家電簿</h1>
      </header>

      <section class="panel auth-panel" aria-labelledby="auth-title">
        <h2 id="auth-title">ログイン</h2>
        <label for="auth-email">メールアドレス</label>
        <input id="auth-email" type="email" autocomplete="email" required />
        <label for="auth-password">パスワード（6文字以上）</label>
        <input id="auth-password" type="password" autocomplete="current-password" required />
        <p id="auth-error" class="form-error"></p>
        <div class="form-actions auth-actions">
          <button id="login-button" class="primary-button" type="button">ログイン</button>
          <button id="signup-button" class="ghost-button" type="button">新規登録</button>
          <button id="local-mode-button" class="ghost-button" type="button">ローカル保存</button>
        </div>
      </section>

      <dialog id="local-mode-dialog" class="local-mode-dialog">
        <article class="local-mode-dialog-card">
          <h2>ローカル保存について</h2>
          <p>
            このスマホのブラウザ内に保存されます。機種変更、ブラウザのデータ削除、プライベートブラウズではデータが失われる場合があります。必ず保存をタップしてバックアップしてください。
          </p>
          <label class="checkbox-field local-mode-dialog-check" for="hide-local-mode-warning">
            <input id="hide-local-mode-warning" type="checkbox" />
            <span>今後表示しない</span>
          </label>
          <div class="form-actions auth-actions">
            <button id="local-mode-start-button" class="primary-button" type="button">開始する</button>
            <button id="local-mode-cancel-button" class="ghost-button" type="button">キャンセル</button>
          </div>
        </article>
      </dialog>
    </main>
    <script type="module" src="js/login.js"></script>
  </body>
</html>
